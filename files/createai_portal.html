<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CreateAI Product Intelligence Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#18140F;--paper:#F6F4EF;--card:#FFFFFF;
  --maroon:#8C1D40;--maroon-dark:#6E1733;--maroon-bg:rgba(140,29,64,0.07);
  --gold:#FFC627;--gold-bg:rgba(255,198,39,0.12);
  --slate:#7A7570;--slate-light:#B0AA9F;--border:#E4E0D6;
  --cat-feature:#2F6F4E;--cat-usability:#2C5F8A;--cat-fixed:#8C5A2B;
  --cat-a11y:#1F7A72;--cat-announce:#5B6AF0;
  --r:10px;--r-sm:6px;
  --shadow:0 2px 12px rgba(24,20,15,0.08);
  --shadow-lg:0 8px 32px rgba(24,20,15,0.12);
  --nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;padding-top:var(--nav-h);}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--ink);z-index:100;display:flex;align-items:center;padding:0 24px;gap:32px;}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;letter-spacing:0.02em;white-space:nowrap;}
.nav-logo span{color:var(--gold);}
.nav-links{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav-links::-webkit-scrollbar{display:none;}
.nav-link{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:rgba(255,255,255,0.6);padding:6px 12px;border-radius:6px;white-space:nowrap;transition:color .15s,background .15s;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.08);}
.nav-link.active{color:#fff;background:var(--maroon);}

/* PAGE */
.page{max-width:1060px;margin:0 auto;padding:40px 20px 80px;}
.page-wide{max-width:1160px;margin:0 auto;padding:40px 20px 80px;}

/* TYPOGRAPHY */
.page-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--maroon);margin-bottom:10px;}
.page-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;letter-spacing:-0.02em;line-height:1.15;margin-bottom:12px;}
.page-sub{font-size:16px;color:var(--slate);line-height:1.6;max-width:580px;margin-bottom:36px;}
.section-label{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin-bottom:18px;}
.mono{font-family:'JetBrains Mono',monospace;}

/* CHIPS */
.chip{display:inline-flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--ink);}
.chip-cat{padding:3px 9px;border-radius:4px;font-size:10.5px;}
.chip-feature{background:rgba(47,111,78,0.1);border-color:rgba(47,111,78,0.3);color:#2F6F4E;}
.chip-usability{background:rgba(44,95,138,0.1);border-color:rgba(44,95,138,0.3);color:#2C5F8A;}
.chip-fixed{background:rgba(140,90,43,0.1);border-color:rgba(140,90,43,0.3);color:#8C5A2B;}
.chip-a11y{background:rgba(31,122,114,0.1);border-color:rgba(31,122,114,0.3);color:#1F7A72;}
.chip-announce{background:rgba(91,106,240,0.1);border-color:rgba(91,106,240,0.3);color:#5B6AF0;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;}
.card-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.card-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

/* DIVIDER */
.section-sep{border:none;border-top:1px solid var(--border);margin:42px 0;}

/* ========== HOME ========== */
.home-hero{background:var(--ink);border-radius:14px;padding:44px 48px;margin-bottom:42px;color:#fff;}
.home-hero h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:38px;letter-spacing:-0.025em;line-height:1.15;margin-bottom:16px;}
.home-hero h1 span{color:var(--gold);}
.home-hero p{font-size:16px;line-height:1.7;color:rgba(255,255,255,0.72);max-width:600px;}

.build-cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.build-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.build-card:hover{border-color:var(--maroon);box-shadow:var(--shadow);}
.build-card .bc-icon{font-size:26px;margin-bottom:10px;}
.build-card .bc-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;margin-bottom:5px;}
.build-card .bc-tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--slate);}

.build-detail{display:none;background:var(--card);border:1.5px solid var(--maroon);border-radius:var(--r);padding:28px;margin-top:14px;}
.build-detail.open{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;}
.bd-what h4{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;margin-bottom:6px;}
.bd-what .badge{display:inline-block;background:var(--maroon-bg);color:var(--maroon);font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;margin-bottom:10px;}
.bd-what p{font-size:13.5px;line-height:1.6;color:#4A453E;}
.bd-sec-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--slate);margin-bottom:10px;}
.bd-feature-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
.bd-feature-list li{font-size:13px;padding:6px 10px;background:var(--paper);border-radius:6px;border:1px solid var(--border);}
.bd-ex-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
.bd-ex-list li{font-size:13px;color:#4A453E;padding-left:12px;border-left:2px solid var(--gold);line-height:1.4;}

.snapshot-grid{display:flex;flex-wrap:wrap;gap:10px;}
.snap-chip{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 16px;min-width:200px;}
.snap-chip .sc-icon{font-size:20px;}
.snap-chip .sc-label{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;}
.snap-chip .sc-sub{font-size:11.5px;color:var(--slate);margin-top:1px;}

.home-launches-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.home-launch-card{border-radius:var(--r);padding:18px 20px;border:1px solid var(--border);}
.home-launch-card .hlc-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:10px;}
.home-launch-card .hlc-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;margin-bottom:4px;}
.home-launch-card .hlc-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);margin-bottom:8px;}
.home-launch-card .hlc-why{font-size:12.5px;color:#4A453E;line-height:1.5;}
.see-all{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--maroon);text-decoration:underline;text-underline-offset:2px;margin-top:12px;cursor:pointer;}

.mini-timeline{display:flex;align-items:flex-start;gap:0;margin:10px 0;}
.mt-phase{flex:1;text-align:center;position:relative;}
.mt-phase:not(:last-child)::after{content:'';position:absolute;top:15px;left:50%;right:-50%;height:2px;background:var(--border);}
.mt-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;color:#fff;margin:0 auto 8px;position:relative;z-index:1;}
.mt-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;margin-bottom:2px;}
.mt-period{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--slate);}

/* ========== PRODUCTS ========== */
.prod-tabs{display:flex;gap:6px;margin-bottom:28px;border-bottom:1.5px solid var(--border);padding-bottom:0;}
.prod-tab{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;padding:10px 18px;border-radius:8px 8px 0 0;border:1.5px solid transparent;border-bottom:none;color:var(--slate);transition:color .15s,background .15s;margin-bottom:-1.5px;}
.prod-tab:hover{color:var(--ink);}
.prod-tab.active{background:var(--card);border-color:var(--border);color:var(--ink);}
.prod-hero{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px;align-items:start;}
.prod-desc{font-size:15px;line-height:1.7;color:#4A453E;}
.prod-stat-row{display:flex;gap:16px;flex-wrap:wrap;}
.prod-stat{text-align:center;padding:16px 20px;background:var(--paper);border-radius:var(--r);border:1px solid var(--border);}
.prod-stat .pstat-n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:var(--maroon);}
.prod-stat .pstat-l{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);margin-top:2px;}
.prod-cap-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}

.prod-launches{display:flex;flex-direction:column;gap:12px;}
.pl-card{display:flex;gap:14px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);}
.pl-bar{width:3px;border-radius:2px;flex-shrink:0;background:var(--maroon);}
.pl-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px;}
.pl-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);margin-bottom:4px;}
.pl-desc{font-size:13px;color:#4A453E;line-height:1.5;}

.recent-entries{display:flex;flex-direction:column;gap:10px;}
.re-entry{display:flex;gap:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);}
.re-bar{width:3px;border-radius:2px;flex-shrink:0;}
.re-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;margin-bottom:4px;}
.re-desc{font-size:12.5px;color:#4A453E;line-height:1.5;}
.re-meta{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap;}

/* ========== CAPABILITIES ========== */
.cap-section{margin-bottom:32px;}
.cap-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;}
.cap-header-icon{font-size:20px;}
.cap-header-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;flex:1;}
.cap-header-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);}
.cap-chevron{color:var(--maroon);font-size:12px;transition:transform .15s;}
.cap-section.open .cap-chevron{transform:rotate(90deg);}
.cap-items{display:none;grid-template-columns:repeat(2,1fr);gap:12px;}
.cap-section.open .cap-items{display:grid;}
.cap-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;border-left:3px solid var(--border);}
.cap-item-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;margin-bottom:5px;}
.cap-item-desc{font-size:12.5px;color:#4A453E;line-height:1.5;}

/* ========== STRATEGIC LAUNCHES ========== */
.sl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.sl-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.sl-header{padding:20px 22px 16px;border-bottom:1px solid var(--border);}
.sl-badge-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sl-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;padding:4px 10px;border-radius:20px;color:#fff;}
.sl-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);}
.sl-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;line-height:1.2;}
.sl-body{padding:18px 22px;}
.sl-section-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--slate);margin-bottom:8px;}
.sl-why{font-size:13.5px;color:#4A453E;line-height:1.6;margin-bottom:16px;}
.sl-impact-box{background:var(--paper);border-radius:var(--r-sm);border-left:3px solid var(--gold);padding:12px 14px;margin-bottom:16px;}
.sl-impact-box p{font-size:13px;color:var(--ink);line-height:1.55;}
.sl-related{display:flex;flex-wrap:wrap;gap:6px;}

/* ========== PLATFORM EVOLUTION ========== */
.evo-container{position:relative;padding-left:48px;}
.evo-spine{position:absolute;left:16px;top:24px;bottom:24px;width:2px;background:var(--border);}
.phase-card{position:relative;margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.phase-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.phase-dot{position:absolute;left:-40px;top:22px;width:18px;height:18px;border-radius:50%;border:3px solid var(--card);display:flex;align-items:center;justify-content:center;}
.phase-header{padding:22px 24px 18px;cursor:pointer;display:flex;align-items:flex-start;gap:16px;}
.phase-num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px;color:var(--slate);margin-top:2px;white-space:nowrap;}
.phase-main{flex:1;}
.phase-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;margin-bottom:3px;}
.phase-period{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--slate);}
.phase-chevron{color:var(--slate);font-size:12px;margin-top:4px;transition:transform .15s;}
.phase-card.open .phase-chevron{transform:rotate(180deg);}
.phase-desc{padding:0 24px 10px;font-size:14px;color:#4A453E;line-height:1.6;}
.phase-body{display:none;padding:0 24px 22px;}
.phase-card.open .phase-body{display:block;}
.phase-caps{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
.phase-milestone{background:var(--paper);border-radius:var(--r-sm);border-left:3px solid var(--gold);padding:12px 16px;}
.phase-milestone-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--slate);margin-bottom:6px;}
.phase-milestone p{font-size:13px;line-height:1.5;color:var(--ink);}
.phase-entries-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--slate);margin:18px 0 10px;}

/* ========== RELEASE EXPLORER ========== */
.rex-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.rex-select{font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--ink);outline:none;cursor:pointer;}
.rex-select:focus{border-color:var(--maroon);}
.rex-search{font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--ink);outline:none;width:220px;flex-shrink:0;}
.rex-search:focus{border-color:var(--maroon);}
.rex-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--slate);margin-left:auto;}
.rex-month{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.rex-month-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;}
.rex-month-tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--maroon);background:var(--maroon-bg);padding:3px 8px;border-radius:4px;}
.rex-month-label{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;flex:1;}
.rex-month-count{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--slate);}
.rex-chevron{color:var(--maroon);font-size:11px;transition:transform .15s;}
.rex-month.open .rex-chevron{transform:rotate(90deg);}
.rex-entries{display:none;border-top:1px solid var(--border);}
.rex-month.open .rex-entries{display:block;}
.rex-entry{display:flex;gap:10px;padding:12px 16px 12px 13px;border-bottom:1px solid var(--border);}
.rex-entry:last-child{border-bottom:none;}
.rex-bar{width:3px;border-radius:2px;flex-shrink:0;margin-top:3px;}
.rex-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;margin-bottom:4px;}
.rex-desc{font-size:12.5px;color:#4A453E;line-height:1.5;}
.rex-meta{display:flex;gap:7px;margin-top:6px;flex-wrap:wrap;}
.no-rex{text-align:center;padding:50px 20px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--slate);}

/* ========== INSIGHTS ========== */
.insights-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:28px;}
.ins-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;}
.ins-card-full{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:22px;}
.ins-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px;}
.ins-sub{font-size:12.5px;color:var(--slate);margin-bottom:18px;}
.growth-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.growth-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.gs-label{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--slate);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.gs-before{font-size:12px;color:var(--slate);margin-bottom:2px;}
.gs-arrow{font-size:16px;color:var(--maroon);margin:4px 0;}
.gs-after{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:var(--maroon);}
.gs-when{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--slate-light);margin-top:4px;}

/* Charts */
.chart-wrap{overflow-x:auto;}
svg.bar-chart text{font-family:'JetBrains Mono',monospace;fill:var(--ink);}
.legend-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--slate);font-family:'JetBrains Mono',monospace;}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

/* product breakdown bar */
.prod-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.pbr-label{font-family:'JetBrains Mono',monospace;font-size:12px;width:80px;flex-shrink:0;}
.pbr-track{flex:1;height:8px;background:var(--paper);border-radius:4px;overflow:hidden;}
.pbr-fill{height:100%;border-radius:4px;background:var(--maroon);}
.pbr-n{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--slate);width:30px;text-align:right;}

@media(max-width:720px){
  .card-grid-2,.card-grid-3,.build-cards-grid,.home-launches-grid,.sl-grid,.insights-grid,.growth-grid{grid-template-columns:1fr;}
  .build-detail.open{grid-template-columns:1fr;}
  .prod-hero{grid-template-columns:1fr;}
  .cap-items{grid-template-columns:1fr;}
  .home-hero{padding:28px 24px;}
  .home-hero h1{font-size:26px;}
}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">Create<span>AI</span></div>
  <div class="nav-links">
    <a class="nav-link" data-route="home" href="#home">Home</a>
    <a class="nav-link" data-route="products" href="#products">Products</a>
    <a class="nav-link" data-route="capabilities" href="#capabilities">Capabilities</a>
    <a class="nav-link" data-route="strategic-launches" href="#strategic-launches">Strategic Launches</a>
    <a class="nav-link" data-route="platform-evolution" href="#platform-evolution">Platform Evolution</a>
    <a class="nav-link" data-route="release-explorer" href="#release-explorer">Release Explorer</a>
    <a class="nav-link" data-route="insights" href="#insights">Insights</a>
  </div>
</nav>

function navigate(route){

}

/* ══════════════════════════════════════════════
   RELEASE EXPLORER
══════════════════════════════════════════════ */
function renderReleaseExplorer(){
  const months = DATA.meta.months;
  const products = ['all','Builder','Chat','Compare','Platform','Toolkit'];
  const cats = ['all','New Feature','Usability Enhancement','Resolved Issue','Accessibility','Announcement'];
  const prodOpts = products.map(p=>`<option value="${p}"${rexFilters.product===p?' selected':''}>${p==='all'?'All Products':p}</option>`).join('');
  const catOpts = cats.map(c=>`<option value="${c}"${rexFilters.category===c?' selected':''}>${c==='all'?'All Categories':c}</option>`).join('');
  const monthOpts = ['all',...months].map(m=>`<option value="${m}"${rexFilters.month===m?' selected':''}>${m==='all'?'All Months':m}</option>`).join('');
  const filtered = ENTRIES.filter(e=>{
    if(rexFilters.product!=='all'&&e.product!==rexFilters.product) return false;
    if(rexFilters.category!=='all'&&e.category!==rexFilters.category) return false;
    if(rexFilters.month!=='all'&&e.date!==rexFilters.month) return false;
    if(rexFilters.q){const hay=(e.title+' '+e.description+' '+e.product+' '+e.category).toLowerCase();if(!hay.includes(rexFilters.q))return false;}
    return true;
  });
  const byMonth={};
  filtered.forEach(e=>(byMonth[e.date]=byMonth[e.date]||[]).push(e));
  const monthsPresent = months.filter(m=>byMonth[m]);
  const monthsHtml = monthsPresent.map((m,i)=>{
    const items=byMonth[m];
    const isOpen = openRexMonths[m]!==undefined ? openRexMonths[m] : i<2;
    const entriesHtml = items.map(e=>`
      <div class="rex-entry">
        <div class="rex-bar" style="background:${CAT_COLOR[e.category]||'var(--slate)'}"></div>
        <div><div class="rex-title">${esc(e.title)}</div>
        <div class="rex-desc">${esc(e.description)}</div>
        <div class="rex-meta">${chipCat(e.category)}${chipProd(e.product)}</div></div>
      </div>`).join('');
    return `<div class="rex-month${isOpen?' open':''}" data-rex-month="${m}">
      <div class="rex-month-head">
        <span class="rex-chevron">▸</span>
        <span class="rex-month-tag">${m}</span>
        <span class="rex-month-label">${items[0].month_label}</span>
        <span class="rex-month-count">${items.length} release${items.length===1?'':'s'}</span>
      </div>
      <div class="rex-entries">${entriesHtml}</div>
    </div>`;
  }).join('');
  return `<div class="page">
    <div class="page-eyebrow">Release Explorer</div>
    <div class="page-title">Full Release History</div>
    <div class="page-sub">294 releases across 24 months — filter by product, category, or month, or search for anything.</div>
    <div class="rex-toolbar">
      <select class="rex-select" id="rex-prod">${prodOpts}</select>
      <select class="rex-select" id="rex-cat">${catOpts}</select>
      <select class="rex-select" id="rex-month">${monthOpts}</select>
      <input class="rex-search" id="rex-q" placeholder="Search releases…" value="${esc(rexFilters.q)}">
      <span class="rex-count">${filtered.length} result${filtered.length===1?'':'s'}</span>
    </div>
    ${monthsHtml||`<div class="no-rex">No releases match your filters.</div>`}
  </div>`;
}

/* ══════════════════════════════════════════════
   INSIGHTS
══════════════════════════════════════════════ */
function renderInsights(){
  const qs = METRICS.quarters_sorted;
  const cats = ['New Feature','Usability Enhancement','Resolved Issue','Accessibility','Announcement'];
  const catColors = [CAT_COLOR['New Feature'],CAT_COLOR['Usability Enhancement'],CAT_COLOR['Resolved Issue'],CAT_COLOR['Accessibility'],CAT_COLOR['Announcement']];
  const maxTotal = Math.max(...qs.map(q=>METRICS.quarterly[q]?.total||0));
  const barW=52, gap=8, padL=30, padT=10, padB=30, chartH=160, svgW=qs.length*(barW+gap)+padL+20;
  let bars='', xLabels='', yLines='';
  for(let y=0;y<=maxTotal;y+=10){
    const yPos=padT+chartH-(y/maxTotal)*chartH;
    yLines+=`<line x1="${padL}" y1="${yPos}" x2="${svgW}" y2="${yPos}" stroke="var(--border)" stroke-width="1"/>`;
    yLines+=`<text x="${padL-4}" y="${yPos+4}" text-anchor="end" font-size="9" fill="var(--slate)">${y}</text>`;
  }
  qs.forEach((q,i)=>{
    const qd=METRICS.quarterly[q]||{};
    const x=padL+i*(barW+gap);
    let stackY=padT+chartH;
    cats.forEach((cat,ci)=>{
      const v=qd[cat]||0;
      if(!v)return;
      const h=(v/maxTotal)*chartH;
      stackY-=h;
      bars+=`<rect x="${x}" y="${stackY}" width="${barW}" height="${h}" fill="${catColors[ci]}" rx="2" title="${cat}:${v}"/>`;
    });
    xLabels+=`<text x="${x+barW/2}" y="${padT+chartH+14}" text-anchor="middle" font-size="9" fill="var(--slate)">${q}</text>`;
  });
  const velocityMax = Math.max(...qs.map(q=>METRICS.quarterly[q]?.total||0));
  const prodTotal = METRICS.product;
  const maxProd = Math.max(...Object.values(prodTotal).map(v=>v.total||0));
  const prodBars = Object.entries(prodTotal).sort((a,b)=>b[1].total-a[1].total).map(([p,v])=>`
    <div class="prod-bar-row">
      <span class="pbr-label">${esc(p)}</span>
      <div class="pbr-track"><div class="pbr-fill" style="width:${Math.round((v.total/maxProd)*100)}%;background:${PRODUCT_COLOR[p]||'var(--maroon)'}"></div></div>
      <span class="pbr-n">${v.total}</span>
    </div>`).join('');
  const legend = cats.map((c,i)=>`<span class="leg-item"><span class="leg-dot" style="background:${catColors[i]}"></span>${c}</span>`).join('');
  return `<div class="page">
    <div class="page-eyebrow">Insights</div>
    <div class="page-title">Product Intelligence</div>
    <div class="page-sub">What the release data reveals about where investment is going and how the platform is evolving.</div>
    <div class="section-label">Platform Growth Metrics</div>
    <div class="growth-grid" style="margin-bottom:36px">
      <div class="growth-stat"><div class="gs-label">Model Library</div><div class="gs-before">~30 models at launch</div><div class="gs-arrow">↓</div><div class="gs-after">40+</div><div class="gs-when">as of Jul 2024, growing</div></div>
      <div class="growth-stat"><div class="gs-label">Project Sharing</div><div class="gs-before">10 users at once</div><div class="gs-arrow">↓</div><div class="gs-after">30 users</div><div class="gs-when">since May 2025</div></div>
      <div class="growth-stat"><div class="gs-label">Token Rate Limit</div><div class="gs-before">Default unspecified</div><div class="gs-arrow">↓</div><div class="gs-after">750K TPM</div><div class="gs-when">since Aug 2025</div></div>
      <div class="growth-stat"><div class="gs-label">Marketplace Page</div><div class="gs-before">10 projects/page</div><div class="gs-arrow">↓</div><div class="gs-after">50/page</div><div class="gs-when">since Jan 2026</div></div>
    </div>
    <div class="ins-card-full">
      <div class="ins-title">Investment by Theme — Quarterly</div>
      <div class="ins-sub">Where development effort goes, by category, each quarter (${DATA.meta.total} total releases)</div>
      <div class="chart-wrap">
        <svg class="bar-chart" width="${svgW}" height="${padT+chartH+padB}" viewBox="0 0 ${svgW} ${padT+chartH+padB}">
          ${yLines}${bars}${xLabels}
        </svg>
      </div>
      <div class="legend-row">${legend}</div>
    </div>
    <div class="insights-grid">
      <div class="ins-card">
        <div class="ins-title">Releases by Product</div>
        <div class="ins-sub">Total releases since June 2024</div>
        ${prodBars}
      </div>
      <div class="ins-card">
        <div class="ins-title">Release Categories — All Time</div>
        <div class="ins-sub">What type of work shipped</div>
        ${cats.map(cat=>{
          const n=Object.values(METRICS.quarterly).reduce((s,q)=>s+(q[cat]||0),0);
          return `<div class="prod-bar-row">
            <span class="pbr-label" style="width:130px;font-size:11px">${esc(cat)}</span>
            <div class="pbr-track"><div class="pbr-fill" style="width:${Math.round((n/DATA.meta.total)*100)}%;background:${CAT_COLOR[cat]}"></div></div>
            <span class="pbr-n">${n}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="ins-card">
      <div class="ins-title">Investment Themes — What the data says</div>
      <div class="ins-sub">Patterns derived from 294 releases over 24 months</div>
      <div class="card-grid-3" style="margin-top:4px">
        <div style="padding:14px;background:var(--paper);border-radius:var(--r);border:1px solid var(--border)">
          <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px">🔧 Reliability First</div>
          <p style="font-size:13px;color:#4A453E;line-height:1.5">Resolved Issues are the second-largest category. The team ships features fast and fixes quickly — a high-velocity product culture.</p>
        </div>
        <div style="padding:14px;background:var(--paper);border-radius:var(--r);border:1px solid var(--border)">
          <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px">🏗️ Builder-Centric</div>
          <p style="font-size:13px;color:#4A453E;line-height:1.5">Builder receives 56% of all releases. It's the platform's primary creative surface — the most complex and most actively developed product.</p>
        </div>
        <div style="padding:14px;background:var(--paper);border-radius:var(--r);border:1px solid var(--border)">
          <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px">♿ Accessibility Commitment</div>
          <p style="font-size:13px;color:#4A453E;line-height:1.5">Dedicated accessibility releases appear in every major phase — not as an afterthought but as a consistent delivery stream.</p>
        </div>
      </div>
    </div>
  </div>`;
}

/* ── EVENT BINDING ── */
function bindEvents(route){
  const app = document.getElementById('app');
  // nav see-all / route links
  app.addEventListener('click', e=>{
    const seeAll = e.target.closest('[data-route]');
    if(seeAll){e.preventDefault();navigate(seeAll.dataset.route);}
    // build cards
    const bc = e.target.closest('.build-card');
    if(bc){
      const id=bc.dataset.bc;
      const container=document.getElementById('build-detail-container');
      if(openBuildCard===id){openBuildCard=null;container.innerHTML='';}
      else{openBuildCard=id;container.innerHTML=renderBuildDetail(id);}
      return;
    }
    // product tabs
    const pt = e.target.closest('.prod-tab');
    if(pt){currentProdTab=pt.dataset.prod;document.getElementById('prod-content').innerHTML=renderProductContent(currentProdTab);document.querySelectorAll('.prod-tab').forEach(t=>t.classList.toggle('active',t.dataset.prod===currentProdTab));return;}
    // capability accordion
    const ch = e.target.closest('.cap-header');
    if(ch){ch.closest('.cap-section').classList.toggle('open');return;}
    // phase accordion
    const ph = e.target.closest('.phase-header');
    if(ph){ph.closest('.phase-card').classList.toggle('open');return;}
    // rex month toggle
    const rm = e.target.closest('.rex-month-head');
    if(rm){const m=rm.closest('.rex-month');const key=m.dataset.rexMonth;openRexMonths[key]=!m.classList.contains('open');m.classList.toggle('open');return;}
  });
  // rex filters
  if(route==='release-explorer'){
    const rerender=()=>{
      rexFilters.product=document.getElementById('rex-prod').value;
      rexFilters.category=document.getElementById('rex-cat').value;
      rexFilters.month=document.getElementById('rex-month').value;
      rexFilters.q=document.getElementById('rex-q').value.trim().toLowerCase();
      openRexMonths={};
      document.getElementById('app').innerHTML=renderReleaseExplorer();
      bindEvents('release-explorer');
    };
    document.getElementById('rex-prod').addEventListener('change',rerender);
    document.getElementById('rex-cat').addEventListener('change',rerender);
    document.getElementById('rex-month').addEventListener('change',rerender);
    document.getElementById('rex-q').addEventListener('input',rerender);
  }
}

/* ── INIT ── */
navigate(location.hash.slice(1)||'home');
</script>
